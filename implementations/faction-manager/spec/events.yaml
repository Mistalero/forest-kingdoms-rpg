events:
  - name: faction.playerAssigned
    description: Fired when a player is assigned to a faction
    payload:
      type: object
      properties:
        playerId:
          type: string
        factionId:
          type: string
        timestamp:
          type: integer
  - name: faction.balanceChanged
    description: Fired when faction balance changes
    payload:
      type: object
      properties:
        factionId:
          type: string
        powerChange:
          type: number
        influenceChange:
          type: number
        timestamp:
          type: integer
  - name: faction.diplomacyUpdate
    description: Fired when diplomacy status changes
    payload:
      type: object
      properties:
        faction1Id:
          type: string
        faction2Id:
          type: string
        relationChange:
          type: number
        timestamp:
          type: integer
  - name: faction.conflictStarted
    description: Fired when inter-faction conflict begins
    payload:
      type: object
      properties:
        conflictId:
          type: string
        faction1Id:
          type: string
        faction2Id:
          type: string
        startTime:
          type: integer
  - name: faction.conflictEnded
    description: Fired when inter-faction conflict ends
    payload:
      type: object
      properties:
        conflictId:
          type: string
        faction1Id:
          type: string
        faction2Id:
          type: string
        endTime:
          type: integer
        result:
          type: string