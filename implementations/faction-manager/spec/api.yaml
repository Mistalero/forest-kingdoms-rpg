openapi: 3.0.0
info:
  title: Faction Manager Component API
  version: 1.0.0
  description: API for managing factions in Forest Kingdoms RPG
paths:
  /faction/initialize:
    post:
      operationId: initializeFaction
      summary: Initialize a new faction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                factionId:
                  type: string
                name:
                  type: string
                description:
                  type: string
                baseAttributes:
                  type: object
              required:
                - factionId
                - name
      responses:
        '200':
          description: Faction initialized successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '400':
          description: Invalid request
  /faction/player:
    get:
      operationId: getPlayerFaction
      summary: Get player's faction
      parameters:
        - name: playerId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Player faction retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  factionId:
                    type: string
                  factionName:
                    type: string
        '404':
          description: Player not found
  /faction/assign:
    post:
      operationId: assignPlayerToFaction
      summary: Assign player to faction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                playerId:
                  type: string
                factionId:
                  type: string
              required:
                - playerId
                - factionId
      responses:
        '200':
          description: Player assigned successfully
        '400':
          description: Invalid assignment
  /faction/balance:
    get:
      operationId: getFactionBalance
      summary: Get current faction balance
      responses:
        '200':
          description: Faction balance retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  factions:
                    type: array
                    items:
                      type: object
                      properties:
                        factionId:
                          type: string
                        power:
                          type: number
                        influence:
                          type: number